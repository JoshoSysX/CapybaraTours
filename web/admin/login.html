<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Acceso Administrador</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="login-page">
  <div class="px-3 w-100">
    <div class="card login-card mx-auto">
      <div class="card-header">
        <img src="../assets/png/logo.png" alt="Capibara Tours">
        <p class="text-white mb-0 mt-1 fw-semibold" style="font-size:.9rem;">Panel de Administración</p>
      </div>
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-shield-lock-fill fs-5" style="color:var(--ct-accent);"></i>
          <h5 class="mb-0 fw-bold" style="color:var(--ct-accent-dark);">Acceso Restringido</h5>
        </div>
        <p class="small text-muted mb-4">Solo personal autorizado de Capibara Tours. El rol de administrador se asigna directamente en la base de datos, no existe registro público.</p>
        <div class="mb-3">
          <label class="form-label">Usuario (correo)</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-person-badge-fill" style="color:var(--ct-accent);"></i></span>
            <input type="text" class="form-control" placeholder="admin@capibaratours.com" id="usuario">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-lock-fill" style="color:var(--ct-accent);"></i></span>
            <input type="password" class="form-control" placeholder="••••••••" id="password">
          </div>
        </div>
        <button class="btn btn-ct-primary w-100 py-2" id="btnAdmin">
          <i class="bi bi-shield-check me-2"></i>Ingresar al Panel
        </button>
        <hr class="my-3">
        <p class="text-center small mb-0">
          <a href="../index.html" style="color:var(--ct-text-muted);"><i class="bi bi-arrow-left me-1"></i>Volver al sitio público</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/jquery-3.6.0.min.js"></script>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.getElementById('btnAdmin').addEventListener('click', accederAdmin);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') accederAdmin(); });

    async function accederAdmin() {
      const u = document.getElementById('usuario').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) { CT.alertWarn('Campos vacíos', 'Ingresa usuario y contraseña.'); return; }
      try {
        const res = await CT.call('AuthController', { action: 'validar', usuario: u, password: p });
        if (res.success && res.userData.rol === 'ADMIN') {
          CT.setSesion(res.userData);
          Swal.fire({ icon:'success', title:'Acceso concedido', text:'Bienvenido al panel de administración.', confirmButtonColor:'#A0522D', timer:1300, showConfirmButton:false })
            .then(() => { window.location.href = 'dashboard.html'; });
        } else if (res.success && res.userData.rol !== 'ADMIN') {
          CT.alertErr('Sin permisos', 'Esta cuenta no tiene rol de administrador.');
        } else {
          CT.alertErr('Acceso denegado', res.message || 'Usuario o contraseña incorrectos.');
        }
      } catch (e) {
        CT.alertErr('Error de conexión', 'No se pudo contactar al servidor.');
      }
    }
  </script>
</body>
</html>
