<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Reservar Cliente</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body style="background:#FFFDF8;">
<div class="admin-wrapper">
  <aside class="sidebar d-flex flex-column">
    <div class="sidebar-header"><img src="../assets/png/logo.png" alt="Logo"><div class="sidebar-title">Panel Admin</div></div>
    <nav class="flex-fill py-2"><ul class="nav flex-column"></ul></nav>
    <div class="p-3 border-top" style="border-color:rgba(255,255,255,.15) !important;">
      <a href="#" id="btnSalir" class="btn btn-sm w-100" style="background:rgba(255,255,255,.1);color:#F5DEB3;border:1px solid rgba(255,255,255,.2);"><i class="bi bi-box-arrow-left me-1"></i>Cerrar sesión</a>
    </div>
  </aside>
  <div class="admin-content">
    <h4 class="mb-4 fw-bold" style="color:var(--ct-accent-dark);"><i class="bi bi-person-plus-fill me-2"></i>Reservar Cliente</h4>
    <div class="card card-ct">
      <div class="card-header"><i class="bi bi-calendar-plus me-2"></i>Datos del cliente, reserva y pago</div>
      <div class="card-body p-4">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Nombres</label><input id="nombres" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Apellidos</label><input id="apellidos" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">DNI</label><input id="dni" class="form-control" maxlength="8"></div>
          <div class="col-md-4"><label class="form-label">Teléfono</label><input id="telefono" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Correo</label><input id="correo" type="email" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Paquete</label><select id="paquete" class="form-select"></select></div>
          <div class="col-md-3"><label class="form-label">Fecha del tour</label><input id="fecha" type="date" class="form-control fecha-futura"></div>
          <div class="col-md-3"><label class="form-label">Cantidad</label><input id="cantidad" type="number" min="1" value="1" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Método de pago</label><select id="metodo" class="form-select"><option value="YAP">Yape</option><option value="PLI">Plin</option><option value="TAR">Tarjeta</option><option value="EFE">Efectivo</option></select></div>
          <div class="col-md-4"><label class="form-label">Monto automático</label><input id="monto" type="number" step="0.01" min="0" value="0" class="form-control" readonly><div id="detalleMonto" class="form-text">Seleccione un paquete para calcular el monto.</div></div>
          <div class="col-md-4"><label class="form-label">Observaciones</label><input id="obs" class="form-control"></div>
          <div class="col-12"><button id="btnGuardar" class="btn btn-ct-primary"><i class="bi bi-check-circle me-1"></i>Registrar reserva</button></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/jquery-3.6.0.min.js"></script>
<script src="../assets/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/admin-reservar-cliente.js"></script>
</body>
</html>
