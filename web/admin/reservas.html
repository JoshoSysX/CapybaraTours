<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Gestión de Reservas</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body style="background:#FFFDF8;">
<div class="admin-wrapper">
  <aside class="sidebar d-flex flex-column">
    <div class="sidebar-header"><img src="../assets/png/logo.png" alt="Logo"><div class="sidebar-title">Panel Admin</div></div>
    <nav class="flex-fill py-2"><ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
      <li class="nav-item"><a class="nav-link active" href="reservas.html"><i class="bi bi-calendar-week"></i>Reservas</a></li>
      <li class="nav-item"><a class="nav-link" href="guias.html"><i class="bi bi-person-badge-fill"></i>Guías</a></li>
      <li class="nav-item"><a class="nav-link" href="transportes.html"><i class="bi bi-truck"></i>Transportes</a></li>
      <li class="nav-item"><a class="nav-link" href="paquetes.html"><i class="bi bi-map-fill"></i>Paquetes</a></li>
      <li class="nav-item"><a class="nav-link" href="cobros.html"><i class="bi bi-cash-stack"></i>Cobros</a></li>
    </ul></nav>
    <div class="p-3 border-top" style="border-color:rgba(255,255,255,.15) !important;">
      <a href="#" id="btnSalir" class="btn btn-sm w-100" style="background:rgba(255,255,255,.1);color:#F5DEB3;border:1px solid rgba(255,255,255,.2);"><i class="bi bi-box-arrow-left me-1"></i>Cerrar sesión</a>
    </div>
  </aside>
  <div class="admin-content">
    <h4 class="mb-4 fw-bold" style="color:var(--ct-accent-dark);"><i class="bi bi-calendar-week me-2"></i>Gestión de Reservas</h4>

    <div class="card card-ct">
      <div class="card-header"><i class="bi bi-table me-2"></i>Todas las Reservas</div>
      <div class="card-body p-3">
        <div id="sinReservas" class="text-center text-muted py-4 d-none">
          <i class="bi bi-calendar-x fs-1"></i><p class="mt-2 mb-0">Aún no hay reservas registradas.</p>
        </div>
        <div class="table-responsive" id="contTabla">
          <table class="table table-hover align-middle">
            <thead><tr><th>#</th><th>Cliente</th><th>Paquete</th><th>Fecha tour</th><th>Personas</th><th>Estado</th><th>Asignación</th><th>Acciones</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="8" class="text-muted small">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/jquery-3.6.0.min.js"></script>
<script src="../assets/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../assets/js/app.js"></script>
<script>
  CT.requireRole('ADMIN');
  document.getElementById('btnSalir').addEventListener('click', async (e) => { e.preventDefault(); await CT.logout(); window.location.href = 'login.html'; });

  const ESTADOS = ['PENDIENTE','CONFIRMADO','PAGADA','EN_CURSO','FINALIZADA','CANCELADA'];
  let guiasDisp = [], transportesDisp = [], detallesPorReserva = {};

  async function cargar() {
    let reservas = [];
    try { reservas = await CT.call('ReservaController', { action: 'listar' }, 'GET'); } catch (e) {}
    try { guiasDisp = await CT.call('GuiaController', { action: 'listar' }, 'GET'); } catch (e) { guiasDisp = []; }
    try { transportesDisp = await CT.call('TransporteController', { action: 'listar' }, 'GET'); } catch (e) { transportesDisp = []; }
    let detalles = [];
    try { detalles = await CT.call('DetalleReservaController', { action: 'listar' }, 'GET'); } catch (e) { detalles = []; }
    detallesPorReserva = {};
    (detalles || []).forEach(d => { if (d.reserva) detallesPorReserva[d.reserva.id_reserva] = d; });

    if (!reservas || reservas.length === 0) {
      document.getElementById('sinReservas').classList.remove('d-none');
      document.getElementById('contTabla').classList.add('d-none');
      return;
    }
    document.getElementById('sinReservas').classList.add('d-none');
    document.getElementById('contTabla').classList.remove('d-none');
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    reservas.forEach(r => {
      const det = detallesPorReserva[r.id_reserva];
      const asignacion = det
        ? `<span class="badge bg-success">Guía y transporte asignados</span>`
        : `<span class="badge bg-warning text-dark">Sin asignar</span>`;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><b style="color:var(--ct-accent);">#${r.id_reserva}</b></td>
        <td>${r.persona ? (r.persona.nombre + ' ' + (r.persona.apellido||'')) : '—'}</td>
        <td>${r.paquete ? r.paquete.nombre : '—'}</td>
        <td>${CT.fechaCorta(r.fecha_programada)}</td>
        <td>${r.cantidad}</td>
        <td>
          <select class="form-select form-select-sm" style="min-width:140px" onchange="cambiarEstado(${r.id_reserva}, this.value)">
            ${ESTADOS.map(e => `<option value="${e}" ${e===r.estadoReserva?'selected':''}>${e}</option>`).join('')}
          </select>
        </td>
        <td>${asignacion}</td>
        <td><button class="btn btn-sm btn-ct-outline" onclick="asignar(${r.id_reserva})"><i class="bi bi-person-check"></i> Asignar</button></td>`;
      tbody.appendChild(tr);
    });
  }

  async function cambiarEstado(idReserva, nuevoEstado) {
    try {
      const r = await CT.call('ReservaController', { action: 'buscar', id: idReserva }, 'GET');
      const ok = await CT.call('ReservaController', {
        action: 'editar',
        id_reserva: idReserva,
        id_persona: r.persona.id_persona,
        id_paquete: r.paquete.id_paquete,
        fecha: new Date().toISOString().slice(0,10),
        fecha_programada: r.fecha_programada ? r.fecha_programada.slice(0,10) : '',
        cantidad_personas: r.cantidad,
        estado: nuevoEstado
      });
      if (ok) CT.alertOk('Estado actualizado'); else CT.alertErr('No se pudo actualizar el estado', '');
    } catch (e) { CT.alertErr('Error de conexión', ''); }
  }

  async function asignar(idReserva) {
    if (!guiasDisp.length || !transportesDisp.length) {
      CT.alertWarn('Faltan datos', 'Registra al menos un guía y un transporte antes de asignar.');
      return;
    }
    const det = detallesPorReserva[idReserva];
    const optsGuia = guiasDisp.map(g => `<option value="${g.idGuia}" ${det && det.guia && det.guia.idGuia===g.idGuia?'selected':''}>${g.nombre}</option>`).join('');
    const optsTransp = transportesDisp.map(t => `<option value="${t.idTransporte}" ${det && det.transporte && det.transporte.idTransporte===t.idTransporte?'selected':''}>${t.vehiculo} - ${t.placa}</option>`).join('');

    const r = await Swal.fire({
      title: 'Asignar guía y transporte', showCancelButton: true, confirmButtonText: 'Guardar', confirmButtonColor: '#A0522D',
      html: `<div class="row g-2 text-start">
        <div class="col-12"><label class="form-label small">Guía</label><select id="swGuia" class="form-select form-select-sm">${optsGuia}</select></div>
        <div class="col-12"><label class="form-label small">Transporte</label><select id="swTransp" class="form-select form-select-sm">${optsTransp}</select></div>
        <div class="col-12"><label class="form-label small">Fecha de salida</label><input id="swFechaSalida" type="date" class="form-control form-control-sm" value="${det ? (det.fecha_salida||'').slice(0,10) : ''}"></div>
      </div>`,
      preConfirm: () => {
        const fecha = document.getElementById('swFechaSalida').value;
        if (!fecha) { Swal.showValidationMessage('Selecciona la fecha de salida'); return false; }
        return { id_guia: document.getElementById('swGuia').value, id_transporte: document.getElementById('swTransp').value, fecha_salida: fecha };
      }
    });
    if (!r.isConfirmed) return;
    try {
      const accion = det ? 'editar' : 'guardar';
      const params = { action: accion, id_reserva: idReserva, id_guia: r.value.id_guia, id_transporte: r.value.id_transporte, fecha_salida: r.value.fecha_salida };
      if (det) params.id_detalle = det.id_detalleReserva;
      const ok = await CT.call('DetalleReservaController', params);
      if (ok) { CT.alertOk('Asignación guardada'); cargar(); } else CT.alertErr('No se pudo guardar la asignación', '');
    } catch (e) { CT.alertErr('Error de conexión', ''); }
  }

  cargar();
</script>
</body>
</html>
