<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Consultas</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body style="background:#FFFDF8;">
<div class="admin-wrapper">
  <aside class="sidebar d-flex flex-column">
    <div class="sidebar-header"><img src="../assets/png/logo.png" alt="Logo"><div class="sidebar-title">Panel Admin</div></div>
    <nav class="flex-fill py-2"><ul class="nav flex-column"></ul></nav>
    <div class="p-3 border-top" style="border-color:rgba(255,255,255,.15) !important;">
      <a href="#" id="btnSalir" class="btn btn-sm w-100" style="background:rgba(255,255,255,.1);color:#F5DEB3;border:1px solid rgba(255,255,255,.2);"><i class="bi bi-box-arrow-left me-1"></i>Cerrar sesión</a>
    </div>
  </aside>
  <div class="admin-content">
    <h4 class="mb-4 fw-bold" style="color:var(--ct-accent-dark);"><i class="bi bi-bar-chart-fill me-2"></i>Consultas y Reportes</h4>
    <div class="row g-3 mb-4" id="kpis"></div>
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card card-ct h-100">
          <div class="card-header"><i class="bi bi-bar-chart me-2"></i>Ranking de paquetes</div>
          <div class="card-body"><div id="graficoPaquetes"></div></div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card card-ct h-100">
          <div class="card-header"><i class="bi bi-people-fill me-2"></i>Clientes frecuentes</div>
          <div class="card-body"><div class="table-responsive"><table class="table table-sm align-middle"><tbody id="clientes"></tbody></table></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/jquery-3.6.0.min.js"></script>
<script src="../assets/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/admin-consultas.js"></script>
</body>
</html>
