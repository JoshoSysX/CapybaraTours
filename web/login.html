<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Iniciar Sesión</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css"><link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="login-page">
  <div class="px-3 w-100">
    <div class="card login-card mx-auto">
      <div class="card-header"><img src="assets/png/logo.png" alt="Capibara Tours"><p class="text-white mb-0 mt-1 fw-semibold">Acceso único al sistema</p></div>
      <div class="card-body p-4">
        <h5 class="mb-1 fw-bold" style="color:var(--ct-accent-dark);">Bienvenido</h5>
        <p class="small text-muted mb-4">Ingresa con tu correo y contraseña. El sistema te enviará al área correspondiente según tu rol.</p>
        <div class="mb-3"><label class="form-label">Correo o usuario</label><div class="input-group"><span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-envelope-fill" style="color:var(--ct-accent);"></i></span><input type="text" class="form-control" placeholder="correo@ejemplo.com" id="usuario"></div></div>
        <div class="mb-3"><label class="form-label">Contraseña</label><div class="input-group"><span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-lock-fill" style="color:var(--ct-accent);"></i></span><input type="password" class="form-control" placeholder="••••••••" id="password"></div></div>
        <button class="btn btn-ct-primary w-100 py-2" id="btnLogin"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</button>
        <hr class="my-3"><p class="text-center small mb-1">¿Aún no tienes cuenta? <a href="cliente/registro.html" style="color:var(--ct-accent);font-weight:600;">Regístrate aquí</a></p>
        <p class="text-center small mb-0"><a href="index.html" style="color:var(--ct-text-muted);"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a></p>
      </div>
    </div>
  </div>
<script src="assets/js/jquery-3.6.0.min.js"></script><script src="assets/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="assets/js/app.js"></script><script src="assets/js/login.js"></script>
</body></html>
