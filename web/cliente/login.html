<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Ingreso Cliente</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="login-page">
  <div class="px-3 w-100">
    <div class="card login-card mx-auto">
      <div class="card-header">
        <img src="../assets/png/logo.png" alt="Capibara Tours">
        <p class="text-white mb-0 mt-1 fw-semibold" style="font-size:.9rem;">Acceso al Portal de Clientes</p>
      </div>
      <div class="card-body p-4">
        <h5 class="mb-1 fw-bold" style="color:var(--ct-accent-dark);">Bienvenido</h5>
        <p class="small text-muted mb-4">Ingresa con tu correo y contraseña para ver y gestionar tus reservas.</p>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-envelope-fill" style="color:var(--ct-accent);"></i></span>
            <input type="email" class="form-control" placeholder="tucorreo@email.com" id="correo">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#FDF5E6;border-color:#E8D5B7;"><i class="bi bi-lock-fill" style="color:var(--ct-accent);"></i></span>
            <input type="password" class="form-control" placeholder="••••••••" id="password">
          </div>
        </div>
        <button class="btn btn-ct-primary w-100 py-2" id="btnLogin">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
        <hr class="my-3">
        <p class="text-center small mb-0">¿Aún no tienes cuenta?
          <a href="registro.html" style="color:var(--ct-accent);font-weight:600;">Regístrate aquí</a>
        </p>
        <p class="text-center small mt-2 mb-0">
          <a href="../index.html" style="color:var(--ct-text-muted);"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/jquery-3.6.0.min.js"></script>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    document.getElementById('btnLogin').addEventListener('click', iniciarSesion);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });

    async function iniciarSesion() {
      const correo = document.getElementById('correo').value.trim();
      const pass   = document.getElementById('password').value.trim();
      if (!correo || !pass) {
        CT.alertWarn('Campos vacíos', 'Por favor completa correo y contraseña.');
        return;
      }
      try {
        const res = await CT.call('AuthController', { action: 'validar', usuario: correo, password: pass });
        if (res.success) {
          if (res.userData.rol !== 'CLIENTE') {
            CT.alertWarn('Acceso restringido', 'Esta cuenta no es de cliente. Usa el acceso de administrador.');
            return;
          }
          CT.setSesion(res.userData);
          Swal.fire({ icon: 'success', title: '¡Bienvenido!', text: 'Redirigiendo a tus reservas...', confirmButtonColor: '#A0522D', timer: 1300, showConfirmButton: false })
            .then(() => { window.location.href = 'mis-reservas.html'; });
        } else {
          CT.alertErr('No se pudo ingresar', res.message || 'Usuario o contraseña incorrectos. Si aún no tienes cuenta, regístrate.');
        }
      } catch (e) {
        CT.alertErr('Error de conexión', 'No se pudo contactar al servidor. Intenta nuevamente.');
      }
    }
  </script>
</body>
</html>
