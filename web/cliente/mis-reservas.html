<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Mis Reservas</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background:#FFFDF8;">

  <nav class="navbar navbar-expand-lg navbar-ct sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
        <img src="../assets/png/logo.png" alt="Capibara Tours">
        <span class="brand-name">Capibara Tours</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMR">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMR">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house-fill me-1"></i>Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="catalogo.html"><i class="bi bi-map-fill me-1"></i>Paquetes</a></li>
          <li class="nav-item"><a class="nav-link" href="reservar.html"><i class="bi bi-calendar-check-fill me-1"></i>Reservar</a></li>
          <li class="nav-item"><a class="nav-link active" href="mis-reservas.html"><i class="bi bi-journal-text me-1"></i>Mis Reservas</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-sm btn-ct-outline px-3" href="#" id="btnSalir"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-fill container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h2 class="page-title mb-0">Mis Reservas</h2>
      <a href="reservar.html" class="btn btn-ct-primary btn-sm px-3"><i class="bi bi-calendar-plus me-1"></i>Nueva Reserva</a>
    </div>

    <div class="row g-3 mb-4" id="tarjetasEstado"></div>

    <div class="card card-ct">
      <div class="card-header"><i class="bi bi-table me-2"></i>Historial de Reservas</div>
      <div class="card-body p-3">
        <div id="cargando" class="text-center text-muted py-4">
          <div class="spinner-border" role="status" style="color:var(--ct-accent);"></div>
        </div>
        <div id="sinReservas" class="text-center text-muted py-4 d-none">
          <i class="bi bi-journal-x fs-1"></i>
          <p class="mt-2 mb-0">Aún no tienes reservas. <a href="reservar.html">Reserva tu primer tour</a>.</p>
        </div>
        <div class="table-responsive d-none" id="contTabla">
          <table class="table table-hover align-middle">
            <thead>
              <tr><th>#Reserva</th><th>Paquete</th><th>Fecha del Tour</th><th>Personas</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tbodyReservas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="ct-footer py-3 mt-auto">
    <div class="container text-center"><p class="small mb-0" style="color:#F5DEB3;">&copy; 2026 Capibara Tours</p></div>
  </footer>

  <script src="../assets/js/jquery-3.6.0.min.js"></script>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/cliente-mis-reservas.js"></script>

</body>
</html>
