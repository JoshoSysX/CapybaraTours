<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara Tours — Catálogo de Paquetes</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background:#FFFDF8;">

  <nav class="navbar navbar-expand-lg navbar-ct sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
        <img src="../assets/png/logo.png" alt="Capibara Tours">
        <span class="brand-name">Capibara Tours</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCat">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCat">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house-fill me-1"></i>Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="catalogo.html"><i class="bi bi-map-fill me-1"></i>Paquetes</a></li>
          <li class="nav-item"><a class="nav-link" href="reservar.html"><i class="bi bi-calendar-check-fill me-1"></i>Reservar</a></li>
          <li class="nav-item"><a class="nav-link" href="mis-reservas.html"><i class="bi bi-journal-text me-1"></i>Mis Reservas</a></li>
          <li class="nav-item ms-lg-2"><a class="btn btn-ct-primary px-3" href="login.html"><i class="bi bi-person-fill me-1"></i>Ingresar</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-fill container py-4">
    <h2 class="page-title">Catálogo de Paquetes Turísticos</h2>

    <!-- Filtros -->
    <div class="card card-ct mb-4 p-3">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label small mb-1">Buscar por nombre</label>
          <input type="text" class="form-control" id="filtroNombre" placeholder="Ej: Laguna Azul" oninput="filtrar()">
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label small mb-1">Precio máximo</label>
          <select class="form-select" id="filtroPrecio" onchange="filtrar()">
            <option value="todos">Cualquier precio</option>
            <option value="50">Hasta S/ 50</option>
            <option value="100">Hasta S/ 100</option>
            <option value="200">Hasta S/ 200</option>
          </select>
        </div>
        <div class="col-12 col-md-4">
          <button class="btn btn-ct-outline w-100" onclick="resetFiltros()"><i class="bi bi-x-circle me-1"></i>Limpiar filtros</button>
        </div>
      </div>
    </div>

    <div id="cargando" class="text-center py-5 text-muted">
      <div class="spinner-border" role="status" style="color:var(--ct-accent);"></div>
      <p class="mt-2 small">Cargando paquetes...</p>
    </div>

    <div id="sinPaquetes" class="text-center py-5 d-none">
      <i class="bi bi-binoculars fs-1 text-muted"></i>
      <p class="mt-2 text-muted">Por el momento no hay paquetes turísticos registrados. Vuelve a intentarlo más tarde.</p>
    </div>

    <!-- Cards (se llenan por JS) -->
    <div class="row g-4 d-none" id="listaPaquetes"></div>

  </main>

  <footer class="ct-footer py-3 mt-5">
    <div class="container text-center">
      <p class="small mb-0" style="color:#F5DEB3;">&copy; 2026 Capibara Tours — Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="../assets/js/jquery-3.6.0.min.js"></script>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    let paquetes = [];

    async function cargarPaquetes() {
      try {
        paquetes = await CT.call('PaqueteController', { action: 'listar' }, 'GET');
      } catch (e) {
        paquetes = [];
      }
      document.getElementById('cargando').classList.add('d-none');
      if (!paquetes || paquetes.length === 0) {
        document.getElementById('sinPaquetes').classList.remove('d-none');
        return;
      }
      document.getElementById('listaPaquetes').classList.remove('d-none');
      render(paquetes);
    }

    function imgSrc(p) {
      if (p.imagen) return '../' + p.imagen;
      return 'https://placehold.co/640x200/A0522D/FFF?text=' + encodeURIComponent(p.nombre || 'Tour');
    }

    function render(lista) {
      const cont = document.getElementById('listaPaquetes');
      cont.innerHTML = '';
      if (lista.length === 0) {
        cont.innerHTML = '<div class="col-12 text-center text-muted py-4">No hay paquetes que coincidan con tu búsqueda.</div>';
        return;
      }
      lista.forEach(p => {
        const col = document.createElement('div');
        col.className = 'col-12 col-md-6 col-lg-4';
        col.innerHTML = `
          <div class="card card-ct tour-card h-100">
            <img src="${imgSrc(p)}" class="card-img-top" alt="${p.nombre}"
                 onerror="this.src='https://placehold.co/640x200/A0522D/FFF?text=Capibara+Tours'">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-1">
                <h5 class="card-title mb-0">${p.nombre}</h5>
                <span class="tour-badge">${p.duracion || ''}</span>
              </div>
              <p class="card-text small flex-fill">${p.descripcion || ''}</p>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <span class="price-tag">${CT.money(p.precio)} <small class="text-muted fw-normal" style="font-size:.75rem;">/ persona</small></span>
                <a href="reservar.html?paquete=${p.id_paquete}" class="btn btn-ct-primary btn-sm px-3">Reservar</a>
              </div>
            </div>
          </div>`;
        cont.appendChild(col);
      });
    }

    function filtrar() {
      const nombre = document.getElementById('filtroNombre').value.trim().toLowerCase();
      const precioMax = document.getElementById('filtroPrecio').value;
      let filtrados = paquetes.filter(p => {
        const okNombre = !nombre || (p.nombre || '').toLowerCase().includes(nombre);
        const okPrecio = precioMax === 'todos' || p.precio <= parseInt(precioMax);
        return okNombre && okPrecio;
      });
      render(filtrados);
    }
    function resetFiltros() {
      document.getElementById('filtroNombre').value = '';
      document.getElementById('filtroPrecio').value = 'todos';
      render(paquetes);
    }

    cargarPaquetes();
  </script>
</body>
</html>
